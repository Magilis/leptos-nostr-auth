<script type="module">
import init, * as bindings from '/basic-csr-105cf5553b2779da.js';
const wasm = await init({ module_or_path: '/basic-csr-105cf5553b2779da_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; margin: 0; }

        [data-nostr-backdrop] {
            position: fixed; inset: 0; background: rgba(0,0,0,.7);
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        [data-nostr-modal] {
            background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            padding: 1.5rem; width: 100%; max-width: 380px; color: #eee;
            box-sizing: border-box;
        }
        [data-nostr-modal-header] {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
        }
        [data-nostr-modal-title] { font-size: 1.1rem; font-weight: 600; margin: 0; }
        [data-nostr-method] {
            display: flex; align-items: center; gap: .75rem; width: 100%;
            background: transparent; border: 1px solid #333; border-radius: 8px;
            padding: .75rem 1rem; color: #eee; cursor: pointer; margin-bottom: .5rem;
            text-align: left; box-sizing: border-box;
        }
        [data-nostr-method]:hover { background: #2a2a2a; }
        [data-nostr-method-title] { display: block; font-weight: 500; font-size: .9rem; }
        [data-nostr-method-subtitle] { display: block; font-size: .75rem; opacity: .55; }
        [data-nostr-badge] {
            background: #7c3aed; color: #fff; font-size: .65rem;
            border-radius: 4px; padding: 1px 6px; margin-left: .4rem;
        }
        [data-nostr-input] {
            width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
            padding: .6rem .75rem; color: #eee; font-size: .9rem; margin-bottom: .75rem;
            box-sizing: border-box;
        }
        [data-nostr-error] {
            background: #3b0a0a; border: 1px solid #7f1d1d; border-radius: 8px;
            color: #fca5a5; padding: .6rem .75rem; font-size: .85rem; margin-top: .75rem;
        }
        [data-nostr-back], [data-nostr-close] {
            background: transparent; border: none; color: #aaa; cursor: pointer;
            padding: .25rem; border-radius: 4px; display: flex; align-items: center;
        }
        [data-nostr-back]:hover, [data-nostr-close]:hover { color: #eee; }
        [data-nostr-divider] {
            color: #555; font-size: .75rem; text-align: center;
            margin: .5rem 0; border-top: 1px solid #333; padding-top: .5rem;
        }
        [data-nostr-tip], [data-nostr-info] {
            background: #1a2a3a; border: 1px solid #1e4976; border-radius: 8px;
            padding: .6rem .75rem; font-size: .85rem; margin-bottom: .75rem;
        }
        [data-nostr-warning] {
            background: #3b1a00; border: 1px solid #7c3500; border-radius: 8px;
            padding: .75rem; margin-bottom: .75rem;
        }
        [data-nostr-restoring] {
            position: fixed; bottom: 1rem; right: 1rem;
            background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
            padding: .5rem 1rem; font-size: .8rem;
        }
    </style>
<link rel="modulepreload" href="/basic-csr-105cf5553b2779da.js" crossorigin="anonymous" integrity="sha384-VFTDf4cqvaLWaQ+WRa7n0/tR6v5t7/jG7dBgzTxG029QM20y28h6DFWTqQSOY/wy"><link rel="preload" href="/basic-csr-105cf5553b2779da_bg.wasm" crossorigin="anonymous" integrity="sha384-jjAXr27KFZf6I3cBE734znKM5hnFJX1egEsuw4HR3GKLCiuZmTRwmsiMDHq5No3Q" as="fetch" type="application/wasm"></head>
<body>
    <!-- app mounts here via leptos::mount::mount_to_body -->
<script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
